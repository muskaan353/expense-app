          type: string
          maxLength: 3
        base_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        exchange_rate_id:
          type: integer
          nullable: true
        settled_at:
          type: string
          format: date-time
        note:
          type: string
        created_by_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
