components:
  schemas:
    AssistantCitation:
      type: object
      properties:
        kind:
          type: string
        reference_id:
          type: integer
      required:
      - kind
      - reference_id
    AssistantQuery:
      type: object
      properties:
        group_id:
          type: integer
        question:
          type: string
          maxLength: 500
      required:
      - group_id
      - question
    AssistantResponse:
      type: object
      properties:
        answer:
          type: string
        data: {}
        citations:
          type: array
          items:
            $ref: '#/components/schemas/AssistantCitation'
        generated_from:
          type: string
      required:
      - answer
      - citations
      - data
      - generated_from
    BalanceEntry:
      type: object
      properties:
        kind:
          type: string
        reference_id:
          type: integer
        description:
          type: string
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - amount
      - description
      - kind
      - reference_id
    Debt:
      type: object
      properties:
        payer_id:
          type: integer
        payee_id:
          type: integer
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - amount
      - payee_id
      - payer_id
    EmailTokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    ExchangeRate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        source_currency:
          type: string
          maxLength: 3
        target_currency:
          type: string
          maxLength: 3
        rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,8})?$
        effective_date:
          type: string
          format: date
        source:
          type: string
          default: manual
          maxLength: 120
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - effective_date
      - id
      - rate
      - source_currency
      - target_currency
    Expense:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group_id:
          type: integer
          writeOnly: true
        description:
          type: string
          maxLength: 255
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        currency:
          type: string
          maxLength: 3
        base_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        exchange_rate_id:
          type: integer
          writeOnly: true
          nullable: true
        paid_by_id:
          type: integer
          writeOnly: true
        split_type:
          $ref: '#/components/schemas/SplitTypeEnum'
        incurred_at:
          type: string
          format: date-time
        notes:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/ExpenseStatusEnum'
          readOnly: true
        created_by_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplitInput'
          writeOnly: true
        split_details:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplit'
          readOnly: true
      required:
      - amount
      - base_amount
      - created_at
      - created_by_id
      - currency
      - description
      - group_id
      - id
      - incurred_at
      - paid_by_id
      - split_details
      - split_type
      - splits
      - status
      - updated_at
    ExpenseRead:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group_id:
          type: integer
          readOnly: true
        description:
          type: string
          maxLength: 255
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          maxLength: 3
        base_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        exchange_rate_id:
          type: integer
          nullable: true
          readOnly: true
        paid_by_id:
          type: integer
          readOnly: true
        split_type:
          $ref: '#/components/schemas/SplitTypeEnum'
        incurred_at:
          type: string
          format: date-time
        notes:
          type: string
        status:
          $ref: '#/components/schemas/ExpenseStatusEnum'
        created_by_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplit'
