      - base_amount
      - created_at
      - created_by_id
      - currency
      - group_id
      - id
      - payee_id
      - payer_id
      - settled_at
    SettlementRead:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group_id:
          type: integer
          readOnly: true
        payer_id:
          type: integer
          readOnly: true
        payee_id:
          type: integer
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          maxLength: 3
        base_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        exchange_rate_id:
          type: integer
          nullable: true
          readOnly: true
        settled_at:
          type: string
          format: date-time
        note:
          type: string
        created_by_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
